<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script</title>
    <style>
        /* สไตล์พื้นฐาน */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ชื่อเว็บมุมซ้ายบน */
        .brand-name {
            position: absolute;
            top: 20px;
            left: 20px;
            margin: 0;
            font-size: 24px;
            color: #ffffff;
            z-index: 100;
        }

        /* ส่วนหน้าจอแรก (พื้นหลังสีเทาอ่อน) */
        #lockScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            background-color: #000000;
            transition: 0.5s;
        }

        /* ส่วนหน้าจอที่สอง (พื้นหลังสีดำ) */
        #resultScreen {
            display: none; /* ซ่อนไว้ก่อน */
            justify-content: center;
            align-items: center;
            height: 100%;
            background-color: #000000; /* พื้นหลังสีดำ */
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        h2 { color: #333; margin-top: 0; }
        
        /* สไตล์ปุ่ม */
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .btn-sub { background-color: #ff0000; color: white; }
        .btn-sub:hover { background-color: #cc0000; }

        .btn-unlock {
            background-color: #28a745;
            color: white;
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-unlock.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ช่องใส่คำสำหรับคัดลอก */
        .copy-box {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            text-align: center;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #f9f9f9;
            color: #333;
            outline: none;
        }

        .btn-copy {
            background-color: #007bff;
            color: white;
        }

        .btn-copy:hover { background-color: #0056b3; }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1 class="brand-name" id="mainTitle">TigerCool</h1>

    <div id="lockScreen">
        <div class="container">
            <h2>🔒 ล็อกเนื้อหา</h2>
            <p>ติดตามเราเพื่อรับลิงก์</p>

            <a href="https://www.youtube.com/@TigerCool67" 
               target="_blank" 
               class="btn btn-sub" 
               onclick="startProcess()">
               1. กดติดตาม (Subscribe)
            </a>

            <button id="unlockBtn" class="btn btn-unlock" onclick="showResult()">
               2. ปลดล็อกและดูเนื้อหา
            </button>
        </div>
    </div>

    <div id="resultScreen">
        <div class="container">
            <h2 style="color: #333;">🎉 ปลดล็อกสำเร็จ!</h2>
            <p>นี่คือสคริปต์:</p>
            
            <input type="text" value="ข้อความลับของคุณตรงนี้" id="textToCopy" class="copy-box" readonly>
            
            <button class="btn btn-copy" onclick="copyToClipboard()">คัดลอกข้อความ</button>
        </div>
    </div>

    <script>
        // 1. ฟังก์ชันเมื่อกดปุ่มติดตาม
        function startProcess() {
            setTimeout(function() {
                const unlockBtn = document.getElementById('unlockBtn');
                unlockBtn.classList.add('active');
                unlockBtn.innerText = "2. ปลดล็อกและดูเนื้อหา (พร้อมแล้ว)";
            }, 2000);
        }

        // 2. ฟังก์ชันเมื่อกดปลดล็อก (เปลี่ยนหน้า)
        function showResult() {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'flex';
            document.getElementById('mainTitle').style.color = '#fff'; // เปลี่ยนสีชื่อเว็บให้เห็นชัดบนพื้นหลังดำ
        }

        // 3. ฟังก์ชันคัดลอกข้อความ
        function copyToClipboard() {
            const copyText = document.getElementById("textToCopy");
            copyText.select();
            copyText.setSelectionRange(0, 99999); // สำหรับมือถือ
            navigator.clipboard.writeText(copyText.value);
            
            alert("คัดลอกข้อความเรียบร้อยแล้ว: " + copyText.value);
        }

        // 4. ป้องกันการแกะโค้ด
        document.onkeydown = function(e) {
            if(event.keyCode == 123 || 
               (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) ||
               (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
                return false;
            }
        };
    </script>

</body>
</html>

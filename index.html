<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script</title>
    <style>
        /* พื้นฐานหน้าเว็บ */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* หน้าที่ 1: หน้าปลดล็อก (พื้นหลังสีเทาอ่อน) */
        #unlock-page {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* หน้าที่ 2: หน้าสคริปต์ (พื้นหลังสีดำ) */
        #script-page {
            background-color: #111;
            display: none; /* ปิดไว้ก่อน */
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* ชื่อเว็บมุมซ้ายบน */
        .brand-name {
            position: absolute;
            top: 20px;
            left: 20px;
            margin: 0;
            font-size: 24px;
            color: #ffffff;
            z-index: 100;
        }
        .script-mode .brand-name { color: #ffffff; } /* เปลี่ยนสีชื่อเว็บเมื่อพื้นหลังดำ */

        /* กล่องคอนเทนเนอร์ */
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-sub { background-color: #ff0000; color: white; }
        .btn-unlock { background-color: #28a745; color: white; opacity: 0.5; pointer-events: none; }
        .btn-unlock.active { opacity: 1; pointer-events: auto; }

        /* ส่วนของกล่องใส่ Script */
        .script-box {
            background: #f8f9fa;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            word-break: break-all;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            margin-bottom: 15px;
            color: #333;
            text-align: left;
        }

        .btn-copy { background-color: #007bff; color: white; }
        .btn-copy:hover { background-color: #0056b3; }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1 class="brand-name" id="main-title">TigerCool</h1>

    <div id="unlock-page">
        <div class="container">
            <h2>🔒 ลิงก์ถูกล็อกอยู่</h2>
            <p>กดติดตามเพื่อรับ Script</p>
            <a href="https://www.youtube.com/@TigerCool67" target="_blank" class="btn btn-sub" onclick="startVerification()">1. กดติดตาม (Subscribe)</a>
            <button id="unlockBtn" class="btn btn-unlock" onclick="showScriptPage()">2. รับสคริปต์</button>
        </div>
    </div>

    <div id="script-page">
        <div class="container">
            <h3>📋 คัดลอกสคริปต์ของคุณ</h3>
            <div class="script-box" id="scriptText">loadstring(game:HttpGet("https://rawscripts.net/raw/UPD!-BloxStrike-SkinChanger-126555"))()</div>
            <button class="btn btn-copy" onclick="copyScript()">คัดลอกข้อความ (Copy)</button>
            <p id="copyStatus" style="font-size: 12px; color: #28a745; display: none;">คัดลอกลง Clipboard แล้ว!</p>
        </div>
    </div>

    <script>
        // 1. ฟังก์ชันปลดล็อกปุ่มที่ 2
        function startVerification() {
            setTimeout(function() {
                const btn = document.getElementById('unlockBtn');
                btn.classList.add('active');
                btn.innerText = "2. ปลดล็อกสำเร็จ! คลิกเพื่อรับสคริปต์";
            }, 2000);
        }

        // 2. ฟังก์ชันสลับไปหน้าสีดำ (หน้าสคริปต์)
        function showScriptPage() {
            document.getElementById('unlock-page').style.display = 'none';
            document.getElementById('script-page').style.display = 'flex';
            document.body.classList.add('script-mode');
            document.getElementById('main-title').style.color = '#fff';
        }

        // 3. ฟังก์ชันคัดลอกสคริปต์
        function copyScript() {
            const text = document.getElementById('scriptText').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const status = document.getElementById('copyStatus');
                status.style.display = 'block';
                setTimeout(() => { status.style.display = 'none'; }, 2000);
            });
        }

        // 4. ป้องกันการแกะโค้ด
        document.onkeydown = function(e) {
            if(event.keyCode == 123 || 
               (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) ||
               (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
                return false;
            }
        };
    </script>

</body>
</html>
